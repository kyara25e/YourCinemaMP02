<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    

    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/CreateMovie.css">
    <link rel="icon" href="data:,"/>

    <title>YourCinema</title>
  </head>
  <body>

    <header class="headerContainer">
      <div class="header">
        <input type="text" placeholder="Search movies and more...">
      
          <img src="./assets/Logo.jpeg" class="Logo">

        <div class="menu">
          <nav>
            <ul>
              <li><a href="./index.html"> Home</a></li>
              <li><a href="./Movie.html"> Movies</a></li>
              <li><a href="./FoodDrink.html">Food & Drink</a></li>
              <li><a href="./CreateMovie.html">Create Movie</a></li>
            </ul>
          </nav>
        </div>
      </div>
 
    </header>

    <main class="container d-flex justify-content-center py-5">

      <div class="card shadow-lg p-4" style="max-width: 550px; width: 100%;">
  
        <h3 class="text-center mb-4">¿Qué películas querés agregar?</h3>

        <form id="form">

          <div class="mb-3">
            <label for="titleInput" class="form-label">Title</label>
            <input 
              type="text" 
              id="titleInput" 
              name="title"
              class="form-control"
              placeholder="Ej: Zootopia 2">
          </div>


          <div class="mb-3">
            <label for="genresImput" class="form-label">Genres</label>
            <input 
              id="genresImput" 
              name="genres"
              class="form-control"
              rows="3"
              placeholder="Adventure">
          </div>


          <div class="mb-3">
            <label for="directorInput" class="form-label">Director</label>
            <input 
              type="text" 
              id="directorInput"
              name="director"
              class="form-control"
              placeholder="Jared Bush y Byron Howard">
          </div>

          <div class="mb-3">
            <label for="durationInput" class="form-label">Duration</label>
            <input 
              type="text" 
              id="durationInput" 
              name="duration"
              class="form-control"
              placeholder="2 horas">
          </div>

          <div class="mb-3">
            <label for="ratingInput" class="form-label">Rating</label>
            <input 
              type="number" 
              id="ratingInput" 
              name="rate"
              class="form-control"
              placeholder="10">
          </div>

          <div class="mb-3">
            <label for="yearInput" class="form-label">Year</label>
            <input 
              type="number" 
              id="yearInput" 
              name="year"
              class="form-control"
              placeholder="2025">
          </div>

          <div class="mb-3">
            <label for="actImg" class="form-label">Poster</label>
            <input 
              type="url" 
              id="actImg" 
              name="poster"
              class="form-control"
              placeholder="https://search.brave.com/images?q=zootopia+2">
          </div>
          
          <div id="alertBox"></div>

          <button type="submit" class="btn btn-primary w-100 mb-3">Submit</button>

          <button id="rest" type="reset" class="btn btn-danger reset-btn">Reset</button>

          <p id="msg" class="text-center text-muted">There are no movies added.</p>

        </form>
  
      </div>
  
    </main>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./public/bundle.js"></script>
  </body>
</html>
